name: Update filtered IP list

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-filtered-ip-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME:-main}" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate exports
        working-directory: repo
        run: node scripts/generate.mjs
        env:
          LIMIT_PER_COUNTRY: "5"
          ENABLE_CONNECT_CHECK: "true"
          CHECK_HOST: "speed.cloudflare.com"
          CHECK_PATH: "/cdn-cgi/trace"
          CHECK_TIMEOUT_MS: "3000"
          CHECK_CONCURRENCY: "10"
          MAX_FAILURES_PER_COUNTRY: "10"
          STRICT_COUNTRY_SELECTED_COUNTS: "false"

      - name: Commit updated exports
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/latest
          if git diff --cached --quiet; then
            echo "No export changes to commit."
          else
            git commit -m "Update filtered IP exports"
            git push
          fi
